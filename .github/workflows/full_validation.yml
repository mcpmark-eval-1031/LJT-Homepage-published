name: Full validation for verl_deepscaler.parquet

on:
  workflow_dispatch:

jobs:
  full-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pandas pyarrow datasets jsonschema requests

      - name: Download ground truth data
        run: |
          mkdir -p groundtruth_workspace
          curl -L -o groundtruth_workspace/deepscaler.json \
            https://raw.githubusercontent.com/hkust-nlp/Toolathlon/main/tasks/finalpool/verl-dataset/groundtruth_workspace/deepscaler.json
          curl -L -o groundtruth_workspace/expected_dataset_info.json \
            https://raw.githubusercontent.com/hkust-nlp/Toolathlon/main/tasks/finalpool/verl-dataset/groundtruth_workspace/expected_dataset_info.json

      - name: Run conversion and format.json validation
        run: |
          python convert_and_validate.py

      - name: Run local check (check_local.py)
        run: |
          python run_local_check.py
