name: Local check for verl_deepscaler.parquet

on:
  workflow_dispatch:

jobs:
  local-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pandas pyarrow

      - name: Download parquet from previous run
        run: |
          curl -L -o verl_deepscaler.parquet \
            https://github.com/mcpmark-eval-1031/temp-luffy/actions/runs/26524314853/artifacts/7245914697

      - name: Download ground truth
        run: |
          mkdir -p groundtruth_workspace
          curl -L -o groundtruth_workspace/deepscaler.json \
            https://raw.githubusercontent.com/hkust-nlp/Toolathlon/main/tasks/finalpool/verl-dataset/groundtruth_workspace/deepscaler.json
          curl -L -o groundtruth_workspace/expected_dataset_info.json \
            https://raw.githubusercontent.com/hkust-nlp/Toolathlon/main/tasks/finalpool/verl-dataset/groundtruth_workspace/expected_dataset_info.json

      - name: Run local check
        run: |
          python run_local_check.py
