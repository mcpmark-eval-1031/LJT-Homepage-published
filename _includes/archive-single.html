{% for post in site.publications reversed %}
<div class="archive__item" itemscope itemtype="https://schema.org/CreativeWork">
  <div class="archive__item-teaser">
    {% if post.image %}
    <img src="{{ post.image | relative_url }}" alt="{{ post.title }}">
    {% endif %}
  </div>
  <div class="archive__item-body">
    <h2 class="archive__item-title" itemprop="headline">{{ post.title }}</h2>
    {% if post.authors %}
    <p class="archive__item-excerpt" itemprop="description">{{ post.authors }}</p>
    {% endif %}
    {% if post.venue %}
    <p class="archive__item-excerpt"><em>{{ post.venue }}</em></p>
    {% endif %}
    {% if post.paperurl %}
    <p><a href="{{ post.paperurl }}" class="btn btn--primary">Paper</a></p>
    {% endif %}
    <a href="{{ post.url | relative_url }}" class="archive__item-teaser--link" aria-label="Read more about {{ post.title }}">Read more</a>
  </div>
</div>
{% endfor %}
